<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>听画艺术作品集验收</title>
  <style>
    body { margin: 0; padding: 32px; background: #ece8df; color: #27231f; font-family: "Microsoft YaHei UI", sans-serif; }
    header { max-width: 1180px; margin: 0 auto 24px; }
    h1 { margin: 0 0 8px; font-size: 30px; }
    p { color: #675f56; }
    main { display: grid; grid-template-columns: repeat(3, minmax(280px, 1fr)); gap: 20px; max-width: 1180px; margin: auto; }
    article { background: #fffdf8; border: 1px solid #cfc6b8; border-radius: 18px; padding: 16px; box-shadow: 0 12px 30px #4b40331a; }
    h2 { margin: 0 0 12px; font-size: 18px; }
    svg { width: 100%; aspect-ratio: 1; border-radius: 12px; background: #f5f0e8; }
    .note { font-size: 13px; line-height: 1.6; }
    @media (max-width: 900px) { main { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header>
    <h1>同一语义场景的三种艺术解释</h1>
    <p>雨中归人：共享人物、伞、路灯、云与街道关系，使用独立造型和材料规则。</p>
  </header>
  <main id="gallery"></main>
  <script type="module" src="/art-gallery.js"></script>
</body>
</html>
