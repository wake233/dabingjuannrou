<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>26 实体图鉴 - 听画绘本验收</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Microsoft YaHei UI", sans-serif; background: #f4ead7; color: #303946; }
    header { background: #303946; color: #f4ead7; padding: 24px 32px; }
    header h1 { font-size: 1.4rem; font-weight: 600; }
    header p { font-size: 0.9rem; opacity: 0.8; margin-top: 4px; }
    .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 24px; max-width: 1400px; margin: 0 auto; }
    .card { background: #fffef9; border: 1.5px solid #d6d1c4; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .card-head { padding: 12px 16px; border-bottom: 1px solid #e8e4d8; display: flex; justify-content: space-between; align-items: center; }
    .card-head h2 { font-size: 1rem; font-weight: 600; }
    .card-head .id { font-size: 0.75rem; color: #86a886; }
    .card-large { padding: 8px; }
    .card-large svg { width: 100%; height: auto; display: block; }
    .card-small { padding: 8px 16px 16px; display: flex; align-items: center; gap: 8px; }
    .card-small svg { width: 60px; height: 42px; border: 1px dotted #d6d1c4; border-radius: 4px; flex-shrink: 0; }
    .card-small .note { font-size: 0.78rem; color: #617f96; }
    footer { text-align: center; padding: 24px; font-size: 0.8rem; color: #9e9e8e; }
  </style>
</head>
<body>
  <header>
    <h1>26 实体绘本图鉴</h1>
    <p>每个实体同时展示近景完整精绘（大）和缩小可辨识效果（小）。仅验收绘本风格，木刻与水墨本轮不改动。</p>
  </header>
  <div class="gallery" id="gallery"></div>
  <footer>听画 · 绘本造型精修视觉验收</footer>

  <script type="module">
    import { renderEntity, TEMPLATE_NAMES, ENTITY_TEMPLATES } from "./templates.js";

    const colors = ["#86a886", "#88a9bd", "#d98f70", "#c97b84", "#e8c47c", "#617f96", "#657f6a", "#355070"];
    const accents = ["#c97b84", "#d98f70", "#e8c47c", "#86a886", "#88a9bd", "#eaac8b", "#b56576", "#6d597a"];

    const gallery = document.getElementById("gallery");
    const templateIds = Object.keys(ENTITY_TEMPLATES);

    templateIds.forEach((templateId, index) => {
      const color = colors[index % colors.length];
      const accent = accents[index % accents.length];
      const ns = "http://www.w3.org/2000/svg";

      const entityLarge = {
        id: `gallery-${templateId}`, kind: "entity", templateId,
        name: TEMPLATE_NAMES[templateId],
        x: 0, y: 0, width: 240, height: 170, rotation: 0, opacity: 1,
        params: { color, accent, density: 0.6, count: 6 }
      };

      const entitySmall = { ...entityLarge, width: 60, height: 42 };

      const card = document.createElement("div");
      card.className = "card";

      const head = document.createElement("div");
      head.className = "card-head";
      head.innerHTML = `<h2>${TEMPLATE_NAMES[templateId]}</h2><span class="id">${templateId}</span>`;

      const largeWrap = document.createElement("div");
      largeWrap.className = "card-large";
      try {
        const svgLarge = document.createElementNS(ns, "svg");
        svgLarge.setAttribute("viewBox", `0 0 ${entityLarge.width} ${entityLarge.height}`);
        svgLarge.setAttribute("width", "240");
        svgLarge.setAttribute("height", "170");
        svgLarge.setAttribute("xmlns", ns);
        svgLarge.appendChild(renderEntity(entityLarge, { quality: "full", namespace: `gallery-${templateId}` }));
        largeWrap.appendChild(svgLarge);
      } catch (err) {
        largeWrap.innerHTML = `<p style="color:red">渲染失败: ${err.message}</p>`;
      }

      const smallWrap = document.createElement("div");
      smallWrap.className = "card-small";
      try {
        const svgSmall = document.createElementNS(ns, "svg");
        svgSmall.setAttribute("viewBox", `0 0 ${entitySmall.width} ${entitySmall.height}`);
        svgSmall.setAttribute("width", "60");
        svgSmall.setAttribute("height", "42");
        svgSmall.setAttribute("xmlns", ns);
        svgSmall.appendChild(renderEntity(entitySmall, { quality: "full", namespace: `gallery-sm-${templateId}` }));
        smallWrap.appendChild(svgSmall);
      } catch (err) {
        smallWrap.innerHTML = `<p style="color:red;font-size:0.7rem">失败</p>`;
      }
      const note = document.createElement("span");
      note.className = "note";
      note.textContent = "缩小效果";
      smallWrap.appendChild(note);

      card.appendChild(head);
      card.appendChild(largeWrap);
      card.appendChild(smallWrap);
      gallery.appendChild(card);
    });
  </script>
</body>
</html>
